<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Vé của tôi - BANVEXE</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      :root {
        --futa-orange: #ef5222;
      }
      body {
        background-color: #f4f7f6;
        font-family: "Segoe UI", sans-serif;
      }

      .ticket-card {
        background: white;
        border-left: 8px solid var(--futa-orange);
        border-radius: 12px;
        transition: 0.3s;
      }

      .ticket-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }

      .toast-custom {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        min-width: 250px;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold text-danger" href="/">BANVEXE</a>

        <div class="ms-auto">
          <div th:if="${userName}" class="dropdown">
            <button
              class="btn btn-light dropdown-toggle fw-bold d-flex align-items-center"
              data-bs-toggle="dropdown"
            >
              <img th:src="${userAvatar}" class="user-avatar me-2" />
              Chào, <span th:text="${userName}"></span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/">Trang chủ</a></li>
              <li>
                <a class="dropdown-item" href="/profile">Thông tin cá nhân</a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item text-danger" href="/logout"
                  >Đăng xuất</a
                >
              </li>
            </ul>
          </div>

          <div th:unless="${userName}">
            <a href="/login" class="btn btn-outline-danger me-2">Đăng nhập</a>
            <a href="/register" class="btn btn-danger">Đăng ký</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="container">
      <h3 class="fw-bold mb-4">
        <i class="bi bi-ticket-perforated text-danger"></i> Lịch sử đặt vé
      </h3>

      <div class="row">
        <div class="col-md-6 mb-4" th:each="ticket : ${tickets}">
          <div class="card ticket-card p-4 shadow border-0 position-relative">
            <!-- STATUS -->
            <span
              class="badge position-absolute top-0 end-0 m-3"
              th:classappend="${ticket.status.name() == 'PAID'} ? 'bg-success' : 'bg-secondary'"
              th:text="${ticket.status}"
            ></span>

            <!-- ROUTE -->
            <h5
              class="fw-bold mb-2"
              th:text="${ticket.trip.route.departureLocation} + ' → ' + ${ticket.trip.route.arrivalLocation}"
            ></h5>

            <small>Mã vé: #<span th:text="${ticket.id}"></span></small>

            <hr />

            <!-- INFO -->
            <div class="row text-center mb-3">
              <div class="col-4">
                <small>NGÀY</small>
                <div
                  th:text="${#temporals.format(ticket.bookingTime, 'dd/MM/yyyy')}"
                ></div>
              </div>

              <div class="col-4">
                <small>GHẾ</small>
                <div
                  class="text-danger"
                  th:text="${#strings.replace(ticket.seats ?: '', ',', ', ')}"
                ></div>
              </div>

              <div class="col-4">
                <small>GIÁ</small>
                <div
                  th:text="${#numbers.formatInteger(ticket.priceAtBooking, 0, 'COMMA')} + 'đ'"
                ></div>
              </div>
            </div>

            <!-- TOTAL -->
            <div class="bg-light p-3 rounded text-center">
              <div
                class="fw-bold text-danger fs-5"
                th:text="${#numbers.formatInteger(ticket.totalAmount, 0, 'COMMA')} + 'đ'"
              ></div>

              <div class="mt-3">
                <a
                  th:href="@{'/invoice/' + ${ticket.id} + '/pdf'}"
                  class="btn btn-outline-danger btn-sm"
                  target="_blank"
                >
                  Xuất PDF
                </a>
              </div>

              <!-- HỦY VÉ -->
              <div class="mt-2">
                <button
                  class="btn btn-outline-danger btn-sm"
                  th:if="${ticket.status.name() == 'PAID'}"
                  th:onclick="'cancelTicket(' + ${ticket.id} + ', this)'"
                >
                  Hủy vé
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script>
      function showToast(message, type = "success") {
        const div = document.createElement("div");
        div.className = "toast-custom alert alert-" + type;
        div.innerText = message;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
      }

      function cancelTicket(ticketId, btn) {
        if (!confirm("Bạn chắc chắn muốn hủy vé?")) return;

        if (btn) btn.disabled = true;

        fetch("/api/tickets/cancel-ticket/" + ticketId, {
          method: "POST",
        })
          .then(async (res) => {
            const text = await res.text();

            if (!res.ok) {
              showToast(text, "danger");
              throw new Error(text);
            }

            return text;
          })
          .then((data) => {
            showToast(data, "success");

            const card = btn.closest(".ticket-card");

            const badge = card.querySelector(".badge");
            badge.innerText = "CANCELLED";
            badge.classList.remove("bg-success");
            badge.classList.add("bg-secondary");

            btn.remove();
          })
          .catch(() => {
            if (btn) btn.disabled = false;
          });
      }
    </script>
  </body>
</html>
