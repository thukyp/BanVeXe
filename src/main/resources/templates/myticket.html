<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Vé của tôi - BANVEXE</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      :root {
        --futa-orange: #ef5222;
      }
      body {
        background-color: #f4f7f6;
        font-family: "Segoe UI", sans-serif;
      }

      .ticket-card {
        background: white;
        border-left: 8px solid var(--futa-orange);
        border-radius: 12px;
        transition: 0.3s;
      }

      .ticket-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .ticket-status {
        position: absolute;
        top: 15px;
        right: 15px;
      }

      .dotted-line {
        border-top: 2px dotted #eee;
        margin: 15px 0;
      }

      .user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold text-danger" href="/">BANVEXE</a>

        <div class="ms-auto">
          <!-- ĐÃ LOGIN -->
          <div th:if="${userName}" class="dropdown">
            <button
              class="btn btn-light dropdown-toggle fw-bold d-flex align-items-center"
              data-bs-toggle="dropdown"
            >
              <img th:src="${userAvatar}" class="user-avatar me-2" />
              Chào, <span th:text="${userName}"></span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/">Trang chủ</a></li>
              <li>
                <a class="dropdown-item" href="/profile">Thông tin cá nhân</a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item text-danger" href="/logout"
                  >Đăng xuất</a
                >
              </li>
            </ul>
          </div>

          <!-- CHƯA LOGIN -->
          <div th:unless="${userName}">
            <a href="/login" class="btn btn-outline-danger me-2">Đăng nhập</a>
            <a href="/register" class="btn btn-danger">Đăng ký</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">
          <i class="bi bi-ticket-perforated me-2 text-danger"></i>
          Lịch sử đặt vé
        </h3>

        <span
          class="badge bg-dark rounded-pill"
          th:text="${#lists.size(tickets)} + ' Vé'"
        ></span>
      </div>

      <!-- KHÔNG CÓ VÉ -->
      <div
        th:if="${#lists.isEmpty(tickets)}"
        class="text-center py-5 bg-white rounded shadow-sm"
      >
        <i class="bi bi-emoji-smile text-muted" style="font-size: 3rem"></i>
        <p class="mt-3 text-muted">Bạn chưa có chuyến hành trình nào.</p>
        <a href="/" class="btn btn-danger rounded-pill px-4">Đặt vé ngay</a>
      </div>

      <!-- CÓ VÉ -->
      <div class="col-md-6" th:each="ticket : ${tickets}">
        <div class="card ticket-card p-4 shadow border-0 position-relative">
          <!-- STATUS -->
          <span
            class="badge bg-success position-absolute top-0 end-0 m-3"
            th:text="${ticket.status}"
          ></span>

          <!-- ROUTE -->
          <div class="mb-3">
            <h5
              class="fw-bold text-dark mb-1"
              th:text="${ticket.trip.route.departureLocation} + ' → ' + ${ticket.trip.route.arrivalLocation}"
            ></h5>
            <small class="text-muted">
              Mã vé: #<span th:text="${ticket.id}"></span>
            </small>
          </div>

          <hr />

          <!-- INFO -->
          <div class="row text-center mb-3">
            <div class="col-4">
              <small class="text-muted">NGÀY ĐẶT</small>
              <div
                class="fw-bold"
                th:text="${#temporals.format(ticket.bookingTime, 'dd/MM/yyyy')}"
              ></div>
            </div>

            <div class="col-4 border-start border-end">
              <small class="text-muted">GHẾ</small>
              <div
                class="fw-bold text-danger"
                th:text="${#strings.replace(ticket.seats ?: '', ',', ', ')}"
              ></div>
            </div>

            <div class="col-4">
              <small class="text-muted">GIÁ/GHẾ</small>
              <div
                class="fw-bold text-primary"
                th:text="${#numbers.formatInteger(ticket.trip.pricePerTicket, 0, 'COMMA')} + 'đ'"
              ></div>
            </div>
          </div>

          <!-- TOTAL -->
          <div class="bg-light rounded p-3 text-center">
            <small class="text-muted">TỔNG TIỀN</small>
            <div
              class="fw-bold text-danger fs-5"
              th:text="${ticket.totalAmount != null 
             ? #numbers.formatInteger(ticket.totalAmount, 0, 'COMMA') + 'đ' 
             : '0đ'}"
            ></div>

            <div class="mt-3 text-center">
              <a
                th:href="@{'/invoice/' + ${ticket.id} + '/pdf'}"
                class="btn btn-outline-danger btn-sm"
                target="_blank"
              >
                <i class="bi bi-file-earmark-pdf"></i> Xuất hóa đơn
              </a>
            </div>

            <!-- BONUS: hiển thị phép tính -->
            <small class="text-muted">
              (<span
                th:text="${ticket.seats != null ? ticket.seats.split(',').length : 0}"
              ></span>
              ghế)
            </small>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
