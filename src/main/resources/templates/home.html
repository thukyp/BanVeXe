<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BusTicket - Đặt vé xe khách trực tuyến</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/home.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark shadow-sm"
      style="background-color: #0060c4"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="/"
          ><i class="fa-solid fa-bus-simple me-2"></i>BusTicket</a
        >
        <div class="ms-auto d-flex align-items-center">
          <div id="auth-section" class="d-flex align-items-center">
            <a href="/login" class="nav-link text-white me-3">Đăng nhập</a>
            <a href="/register" class="btn btn-outline-light btn-sm">Đăng ký</a>
          </div>
          <a href="/myticket" class="nav-link text-white ms-3 border-start ps-3"
            >Vé của tôi</a
          >
        </div>
      </div>
    </nav>

    <div class="hero-section text-center text-white d-flex align-items-center">
      <div class="container">
        <h1 class="display-5 fw-bold mb-4">Kết nối mọi hành trình</h1>
        <div class="search-wrapper p-4 bg-white rounded-4 shadow-lg mx-auto">
          <div class="row g-2">
            <div class="col-md-4">
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"
                  ><i class="fa-solid fa-location-dot text-primary"></i
                ></span>
                <input
                  type="text"
                  id="departureInput"
                  class="form-control border-start-0"
                  placeholder="Nơi đi"
                />
              </div>
            </div>
            <div class="col-md-4">
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"
                  ><i class="fa-solid fa-location-crosshairs text-danger"></i
                ></span>
                <input
                  type="text"
                  id="arrivalInput"
                  class="form-control border-start-0"
                  placeholder="Nơi đến"
                />
              </div>
            </div>
            <div class="col-md-3">
              <input type="date" id="dateInput" class="form-control" />
            </div>
            <div class="col-md-1">
              <button
                onclick="handleSearch()"
                class="btn btn-warning w-100 fw-bold py-2 text-dark"
              >
                TÌM
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container my-5">
      <h3 class="fw-bold mb-4">
        <i class="fa-solid fa-fire text-danger me-2"></i>Tuyến đường phổ biến
      </h3>
      <div class="row g-4" id="route-container">
        <div class="text-center w-100">
          Đang tải hành trình tuyệt vời cho bạn...
        </div>
      </div>
    </div>

    <script src="/js/home.js"></script>
  </body>
</html>
