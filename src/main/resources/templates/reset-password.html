<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - BANVEXE</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet" />
    <style>
        body { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); min-height: 100vh; display: flex; align-items: center; }
        .reset-card { width: 380px; background: white; padding: 40px; border-radius: 15px; margin: auto; }
    </style>
</head>
<body>
    <div class="reset-card shadow">
        <h3 class="fw-bold text-center mb-4">Mật khẩu mới</h3>
        
        <div th:if="${success}" class="alert alert-success small text-center">
            <span th:text="${success}"></span><br>
            <a th:href="@{/login}" class="fw-bold">Đăng nhập ngay</a>
        </div>

        <form th:if="${success == null}" th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Nhập mật khẩu mới</label>
                <input type="password" name="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6">
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
                <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" required oninput="check(this)">
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">Cập nhật mật khẩu</button>
        </form>
    </div>

    <script>
        function check(input) {
            if (input.value != document.getElementsByName('password')[0].value) {
                input.setCustomValidity('Mật khẩu xác nhận không khớp.');
            } else {
                input.setCustomValidity('');
            }
        }
    </script>
</body>
</html>
