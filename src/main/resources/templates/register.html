<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Đăng ký tài khoản</title>
    <script src="/js/auth.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Segoe UI, sans-serif; background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .card { width: 360px; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        h2 { text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 11px; border: none; border-radius: 6px; background: #43e97b; color: white; font-size: 15px; cursor: pointer; }
        button:hover { background: #32d86a; }
        #reg-message { color: #d9534f; margin-top: 10px; text-align: center; font-size: 14px; min-height: 20px; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Đăng ký</h2>
        <input id="reg-username" type="text" placeholder="Tên đăng nhập" />
        <input id="reg-password" type="password" placeholder="Mật khẩu" />
        <input id="reg-fullname" type="text" placeholder="Họ và tên" />
        <input id="reg-email" type="email" placeholder="Email" />
        <input id="reg-phone" type="text" placeholder="Số điện thoại" />
        <button type="button" onclick="handleRegister()">Tạo tài khoản</button>
        <p id="reg-message"></p>
        <div class="link">
            Đã có tài khoản? <a href="/login">Đăng nhập</a>
        </div>
    </div>
</body>
</html>
