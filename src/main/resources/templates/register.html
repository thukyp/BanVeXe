<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - BANVEXE</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .card {
            width: 400px; background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; font-weight: 700; }
        .form-group { margin-bottom: 12px; }
        input {
            width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #4facfe; box-shadow: 0 0 8px rgba(79, 172, 254, 0.2); }
        
        /* Nút đăng ký */
        button[type="submit"] {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: #4facfe; color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        button[type="submit"]:hover { background: #3794f5; }

        .link { text-align: center; margin-top: 15px; font-size: 14px; color: #555; }
        .link a { color: #4facfe; text-decoration: none; font-weight: 600; }
        
        .alert {
            padding: 8px; background-color: #f8d7da; color: #721c24;
            border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Tạo tài khoản</h2>

        <div th:if="${error}" class="alert" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <input type="text" name="fullName" placeholder="Họ và tên" required />
            </div>
            
            <div class="form-group">
                <input type="text" name="username" placeholder="Tên tài khoản" required />
            </div>

            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required />
            </div>

            <div class="form-group">
                <input type="tel" name="phone" placeholder="Số điện thoại" required />
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="Mật khẩu" required minlength="6" />
            </div>

            <button type="submit">Đăng ký ngay</button>
        </form>

        <div class="link">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
        </div>
    </div>
</body>
</html>
