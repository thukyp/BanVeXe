<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý Xe khách</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --sidebar-w: 240px;
      }
      body {
        background: #f4f7f6;
      }
      #sidebar {
        width: var(--sidebar-w);
        position: fixed;
        height: 100vh;
        background: #212529;
        color: white;
      }
      #main {
        margin-left: var(--sidebar-w);
        padding: 30px;
      }
      .nav-link {
        color: #adb5bd;
        padding: 12px 20px;
      }
      .nav-link:hover {
        color: white;
        background: #343a40;
        border-radius: 8px;
      }
      .nav-link.active {
        color: white;
        background: #343a40;
        border-radius: 8px;
      }
      .card {
        border: none;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="p-4 text-center">
        <h4 class="text-warning fw-bold">BANVEXE</h4>
      </div>
      <nav class="nav flex-column px-3">
        <a class="nav-link" href="/admin/dashboard"
          ><i class="bi bi-speedometer2 me-2"></i> Thống kê</a
        >
        <a class="nav-link" href="/admin/routes"
          ><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a
        >
        <a class="nav-link active" href="/admin/buses"
          ><i class="bi bi-truck me-2"></i> Xe khách</a
        >
        <a class="nav-link" href="/admin/trips"
          ><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a
        >
        <a class="nav-link" href="/admin/tickets"
          ><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a
        >
        <a class="nav-link" href="/admin/users"
          ><i class="bi bi-people me-2"></i> Người dùng</a
        >
      </nav>
    </div>

    <div id="main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Quản lý Xe khách</h3>
        <button
          class="btn btn-primary shadow-sm"
          data-bs-toggle="modal"
          data-bs-target="#modalBus"
          onclick="prepareAdd()"
        >
          <i class="bi bi-plus-lg me-1"></i> Thêm xe mới
        </button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th class="ps-4">ID</th>
                <th>Biển số xe</th>
                <th>Loại xe</th>
                <th>Sức chứa</th>
                <th class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="list-buses"></tbody>
          </table>
        </div>
        <div class="card-footer bg-white border-0 py-3">
          <nav>
            <ul
              id="pagination"
              class="pagination justify-content-center mb-0"
            ></ul>
          </nav>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalBus" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="modalTitle">
              Thêm phương tiện mới
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-id" />

            <div class="mb-3">
              <label class="form-label small fw-bold"
                >Biển số xe (busNumber)</label
              >
              <input
                type="text"
                id="inp-busNumber"
                class="form-control"
                placeholder="Ví dụ: 29A-123.45"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold">Loại xe</label>
              <select id="inp-type" class="form-select">
                <option value="Ghế ngồi">Ghế ngồi</option>
                <option value="Giường nằm">Giường nằm</option>
                <option value="Limousine">Limousine</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold">Sức chứa (Số ghế)</label>
              <input
                type="number"
                id="inp-capacity"
                class="form-control"
                value="40"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Hủy
            </button>
            <button class="btn btn-primary px-4" onclick="saveBus()">
              Lưu thông tin
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-bus.js"></script>
  </body>
</html>
