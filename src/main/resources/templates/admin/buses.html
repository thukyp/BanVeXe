<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Xe khách - BANVEXE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --sidebar-bg: #212529;
            --sidebar-w: 240px;
        }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        
        /* Sidebar */
        #sidebar { width: var(--sidebar-w); position: fixed; height: 100vh; background: var(--sidebar-bg); z-index: 1000; }
        .sidebar-brand { padding: 2rem 1.5rem; color: #ffc107; font-weight: 800; font-size: 1.5rem; text-decoration: none; display: block; }
        .nav-link { color: #adb5bd; padding: 12px 25px; display: flex; align-items: center; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { background: #343a40; border-radius: 0 25px 25px 0; margin-right: 15px; }

        /* Content */
        #main { margin-left: var(--sidebar-w); padding: 40px; }
        .card { border: 1px solid #dee2e6; border-radius: 4px; }
        .table thead th { background: #fff; border-bottom: 2px solid #dee2e6; padding: 15px; font-size: 0.85rem; }
        .table td { padding: 15px; vertical-align: middle; }
        
        .badge-bus { padding: 6px 12px; border-radius: 20px; font-weight: 500; font-size: 0.8rem; }
        .bg-seat { background: #e7f5ff; color: #0d6efd; }
    </style>
</head>
<body>

    <div id="sidebar">
        <a href="#" class="sidebar-brand">BANVEXE</a>
        <nav class="nav flex-column">
            <a class="nav-link" href="/admin/dashboard"><i class="bi bi-graph-up me-2"></i> Thống kê</a>
            <a class="nav-link" href="/admin/routes"><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a>
            <a class="nav-link active" href="/admin/buses"><i class="bi bi-truck me-2"></i> Xe khách</a>
            <a class="nav-link" href="/admin/trips"><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a>
            <a class="nav-link" href="/admin/tickets"><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a>
            <a class="nav-link" href="/admin/users"><i class="bi bi-people me-2"></i> Người dùng</a>
        </nav>
    </div>

    <div id="main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Quản lý phương tiện</h3>
            <button class="btn btn-primary px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalBus" onclick="prepareAdd()">
                <i class="bi bi-plus-lg me-1"></i> Thêm xe mới
            </button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Biển số xe</th>
                            <th>Loại xe</th>
                            <th>Sức chứa</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="list-buses"></tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-0 py-3">
                <nav><ul id="pagination" class="pagination justify-content-center mb-0"></ul></nav>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalBus" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold" id="modalTitle">Thêm phương tiện mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="edit-id" />
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Biển số xe</label>
                        <input type="text" id="inp-busNumber" class="form-control" placeholder="Ví dụ: 51B-123.45">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Loại xe</label>
                        <select id="inp-type" class="form-select">
                            <option value="Ghế ngồi">Ghế ngồi</option>
                            <option value="Giường nằm">Giường nằm</option>
                            <option value="Limousine">Limousine</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Sức chứa (Số ghế)</label>
                        <input type="number" id="inp-capacity" class="form-control" value="40">
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary px-4" onclick="saveBus()">Lưu thông tin</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-bus.js"></script>
</body>
</html>
    <script th:src="@{/js/admin-bus.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
