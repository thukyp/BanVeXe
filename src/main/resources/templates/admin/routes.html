<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý Tuyến xe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --sidebar-w: 240px;
      }
      body {
        background: #f4f7f6;
      }
      #sidebar {
        width: var(--sidebar-w);
        position: fixed;
        height: 100vh;
        background: #212529;
        color: white;
      }
      #main {
        margin-left: var(--sidebar-w);
        padding: 30px;
      }
      .nav-link {
        color: #adb5bd;
        padding: 12px 20px;
      }
      .nav-link:hover,
      .nav-link.active {
        color: white;
        background: #343a40;
        border-radius: 8px;
      }
      .card {
        border: none;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="p-4 text-center">
        <h4 class="text-warning fw-bold">BANVEXE</h4>
      </div>
      <nav class="nav flex-column px-3">
        <a class="nav-link" href="/admin/dashboard"
          ><i class="bi bi-speedometer2 me-2"></i> Thống kê</a
        >
        <a class="nav-link active" href="/admin/routes"
          ><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a
        >
        <a class="nav-link" href="/admin/buses"
          ><i class="bi bi-truck me-2"></i> Xe khách</a
        >
        <a class="nav-link" href="/admin/trips"
          ><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a
        >
        <a class="nav-link" href="/admin/tickets"
          ><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a
        >
        <a class="nav-link" href="/admin/users"
          ><i class="bi bi-people me-2"></i> Người dùng</a
        >
      </nav>
    </div>

    <div id="main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Quản lý Tuyến xe</h3>
        <button
          class="btn btn-primary shadow-sm"
          data-bs-toggle="modal"
          data-bs-target="#modalRoute"
        >
          <i class="bi bi-plus-lg me-1"></i> Thêm tuyến mới
        </button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th class="ps-4">ID</th>
                <th>Điểm đi</th>
                <th>Điểm đến</th>
                <th>Khoảng cách</th>
                <th class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="list-routes"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalRoute" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Tạo tuyến đường mới</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label small fw-bold">Điểm khởi hành</label>
              <input
                type="text"
                id="inp-dep"
                class="form-control"
                placeholder="Ví dụ: Hà Nội"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold">Điểm đến</label>
              <input
                type="text"
                id="inp-des"
                class="form-control"
                placeholder="Ví dụ: Hải Phòng"
              />
            </div>
            <div class="mb-3">
              <label class="form-label small fw-bold">Khoảng cách (km)</label>
              <input
                type="number"
                id="inp-dist"
                class="form-control"
                placeholder="Ví dụ: 120"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Hủy
            </button>
            <button class="btn btn-primary px-4" onclick="apiCreateRoute()">
              Lưu tuyến xe
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // 1. Tải danh sách tuyến đường
      async function loadRoutes() {
        try {
          const res = await fetch("/api/routes");
          const data = await res.json();

          // SỬA LỖI UNDEFINED: Khớp chính xác với Entity Route trong Java
          const html = data
            .map(
              (r) => `
                <tr>
                    <td class="ps-4">${r.id}</td>
                    <td class="fw-bold text-secondary">${r.departureLocation || "N/A"}</td>
                    <td class="fw-bold text-primary">${r.arrivalLocation || "N/A"}</td>
                    <td>${r.distanceKm ? r.distanceKm + " km" : "0 km"}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditRouteModal(${r.id}, '${r.departureLocation}', '${r.arrivalLocation}', ${r.distanceKm})">
                            <i class="bi bi-pencil-square"></i> Sửa
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="apiDeleteRoute(${r.id})">
                            <i class="bi bi-trash"></i> Xóa
                        </button>
                    </td>
                </tr>
            `,
            )
            .join("");

          document.getElementById("list-routes").innerHTML =
            html ||
            '<tr><td colspan="5" class="text-center p-4">Chưa có dữ liệu tuyến đường</td></tr>';
        } catch (e) {
          console.error("Lỗi tải danh sách tuyến:", e);
        }
      }

      // 2. Tạo tuyến mới
      async function apiCreateRoute() {
        const data = {
          departureLocation: document.getElementById("inp-dep").value,
          arrivalLocation: document.getElementById("inp-des").value,
          distanceKm: parseFloat(document.getElementById("inp-dist").value),
        };

        if (!data.departureLocation || !data.arrivalLocation) {
          alert("Vui lòng nhập đầy đủ điểm đi và điểm đến!");
          return;
        }

        try {
          await fetch("/api/routes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          bootstrap.Modal.getInstance(
            document.getElementById("modalRoute"),
          ).hide();
          loadRoutes();

          // Reset form
          document.getElementById("inp-dep").value = "";
          document.getElementById("inp-des").value = "";
          document.getElementById("inp-dist").value = "";
        } catch (e) {
          alert("Lỗi khi thêm tuyến xe!");
        }
      }

      // 3. Xóa tuyến
      async function apiDeleteRoute(id) {
        if (confirm("Bạn có chắc chắn muốn xóa tuyến này?")) {
          await fetch(`/api/routes/${id}`, { method: "DELETE" });
          loadRoutes();
        }
      }

      // Tự động load khi trang mở
      document.addEventListener("DOMContentLoaded", loadRoutes);
    </script>
  </body>
</html>
