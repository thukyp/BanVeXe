<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Vé | BANVEXE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        :root { --sidebar-w: 240px; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar Styles */
        #sidebar { width: var(--sidebar-w); position: fixed; height: 100vh; background: #212529; color: white; z-index: 1000; }
        #main { margin-left: var(--sidebar-w); padding: 30px; min-height: 100vh; }
        .nav-link { color: #adb5bd; padding: 12px 20px; transition: 0.3s; }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .nav-link.active { color: white; background: #0d6efd; border-radius: 8px; }
        
        /* Table Styles */
        .card { border: none; border-radius: 12px; }
        .table thead { background-color: #f8f9fa; }
        .status-paid { background-color: #d1e7dd; color: #0f5132; border-radius: 50px; padding: 5px 12px; font-size: 0.85rem; }
        .status-pending { background-color: #fff3cd; color: #664d03; border-radius: 50px; padding: 5px 12px; font-size: 0.85rem; }
        .btn-delete { color: #dc3545; border: none; background: none; transition: 0.2s; }
        .btn-delete:hover { color: #a71d2a; transform: scale(1.1); }
      :root {
        --sidebar-w: 240px;
      }
      body {
        background: #f4f7f6;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #sidebar {
        width: var(--sidebar-w);
        position: fixed;
        height: 100vh;
        background: #212529;
        color: white;
      }
      #main {
        margin-left: var(--sidebar-w);
        padding: 30px;
      }
      .nav-link {
        color: #adb5bd;
        padding: 12px 20px;
        transition: 0.3s;
      }
      .nav-link:hover,
      .nav-link.active {
        color: white;
        background: #343a40;
        border-radius: 8px;
      }
      .card {
        border: none;
        border-radius: 12px;
      }
      .status-paid {
        background-color: #d1e7dd;
        color: #0f5132;
      }
      .status-booked {
        background-color: #fff3cd;
        color: #664d03;
      }
      .status-cancelled {
        background-color: #f8d7da;
        color: #842029;
      }
      .table thead {
        background: #212529;
        color: white;
      }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="p-4 text-center">
            <h4 class="text-warning fw-bold mb-0">BANVEXE</h4>
            <small class="text-muted text-uppercase" style="font-size: 0.65rem;">Hệ thống quản trị</small>
        </div>
        <nav class="nav flex-column px-3 mt-3">
            <a class="nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i> Thống kê</a>
            <a class="nav-link" href="/admin/routes"><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a>
            <a class="nav-link" href="/admin/buses"><i class="bi bi-truck me-2"></i> Xe khách</a>
            <a class="nav-link" href="/admin/trips"><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a>
            <a class="nav-link active" href="/admin/tickets"><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a>
            <a class="nav-link" href="/admin/users"><i class="bi bi-people me-2"></i> Người dùng</a>
        </nav>
    </div>

    <div id="main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">Danh sách Vé đã đặt</h3>
            <div class="text-muted small" id="current-time"></div>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4 py-3">Mã Vé</th>
                            <th>Khách hàng</th>
                            <th>Tuyến đường</th>
                            <th>Số Ghế</th>
                            <th>Ngày đặt</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="list-tickets">
                        </tbody>
                </table>
            </div>
            
            <div class="card-footer bg-white py-3 border-top-0">
                <nav>
                    <ul id="pagination" class="pagination pagination-sm justify-content-center mb-0">
                        </ul>
                </nav>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>const API_URL = "/api/tickets";

async function loadTickets() {
  const tbody = document.getElementById("list-tickets");

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const tickets = Array.isArray(data) ? data : data.content;

    if (!tickets || tickets.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center">Không có dữ liệu</td></tr>`;
      return;
    }

    tbody.innerHTML = tickets.map(t => {
      const name = t.user?.fullName || t.user?.username || "Khách";
      const route = t.trip?.route 
        ? `${t.trip.route.departureLocation} → ${t.trip.route.arrivalLocation}` 
        : "N/A";

      const time = t.bookingTime 
        ? new Date(t.bookingTime).toLocaleString("vi-VN") 
        : "N/A";

      return `
        <tr>
          <td>#${t.id}</td>
          <td>${name}</td>
          <td>${route}</td>
          <td>${t.seats || "N/A"}</td>
          <td>${time}</td>
          <td>${t.status}</td>
          <td>
            <button onclick="deleteTicket(${t.id})">Xóa</button>
          </td>
        </tr>
      `;
    }).join("");

  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7">Lỗi API</td></tr>`;
  }
}

async function deleteTicket(id) {
  if (!confirm("Xóa vé?")) return;

  await fetch(`/api/tickets/${id}`, { method: "DELETE" });
  loadTickets();
}

document.addEventListener("DOMContentLoaded", loadTickets);
</script>
</body>
</html>
