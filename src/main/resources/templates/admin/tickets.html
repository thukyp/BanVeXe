<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý Vé | BANVEXE</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --sidebar-w: 240px;
      }
      body {
        background: #f4f7f6;
      }
      #sidebar {
        width: var(--sidebar-w);
        position: fixed;
        height: 100vh;
        background: #212529;
        color: white;
      }
      #main {
        margin-left: var(--sidebar-w);
        padding: 30px;
      }
      .nav-link {
        color: #adb5bd;
        padding: 12px 20px;
      }
      .nav-link:hover,
      .nav-link.active {
        color: white;
        background: #343a40;
        border-radius: 8px;
      }
      .card {
        border: none;
        border-radius: 12px;
      }
      .status-paid {
        background-color: #d1e7dd;
        color: #0f5132;
      }
      .status-pending {
        background-color: #fff3cd;
        color: #664d03;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="p-4 text-center">
        <h4 class="text-warning fw-bold">BANVEXE</h4>
      </div>
      <nav class="nav flex-column px-3">
        <a class="nav-link" href="/admin/dashboard"
          ><i class="bi bi-speedometer2 me-2"></i> Thống kê</a
        >
        <a class="nav-link" href="/admin/routes"
          ><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a
        >
        <a class="nav-link" href="/admin/buses"
          ><i class="bi bi-truck me-2"></i> Xe khách</a
        >
        <a class="nav-link" href="/admin/trips"
          ><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a
        >
        <a class="nav-link active" href="/admin/tickets"
          ><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a
        >
        <a class="nav-link" href="/admin/users"
          ><i class="bi bi-people me-2"></i> Người dùng</a
        >
      </nav>
    </div>

    <div id="main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Danh sách Vé đã đặt</h3>
        <div class="d-flex gap-2">
          <button
            class="btn btn-outline-secondary shadow-sm"
            onclick="loadTickets()"
          >
            <i class="bi bi-arrow-clockwise"></i> Làm mới
          </button>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th class="ps-4">Mã Vé</th>
                <th>Khách hàng</th>
                <th>Chuyến xe (Tuyến)</th>
                <th>Số ghế</th>
                <th>Ngày đặt</th>
                <th>Trạng thái</th>
                <th class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody id="list-tickets"></tbody>
          </table>
        </div>
        <div class="card-footer bg-white border-0 py-3">
          <nav>
            <ul
              id="pagination"
              class="pagination justify-content-center mb-0"
            ></ul>
          </nav>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function loadTickets() {
        try {
          const res = await fetch("/api/tickets");
          const data = await res.json();

          const html = data
            .map((t) => {
              // Xử lý hiển thị tên khách hàng
              const customerName = t.user
                ? t.user.fullName || t.user.username
                : t.customerName || "Khách vãng lai";

              // Xử lý hiển thị tuyến đường từ object Trip -> Route
              const routeInfo =
                t.trip && t.trip.route
                  ? `${t.trip.route.departureLocation} ➔ ${t.trip.route.arrivalLocation}`
                  : "Không xác định";

              // Định dạng ngày tháng
              const bookingDate = t.bookingDate
                ? new Date(t.bookingDate).toLocaleDateString("vi-VN")
                : "N/A";

              // Phân loại màu trạng thái
              const statusClass =
                t.status === "PAID" ? "status-paid" : "status-pending";
              const statusText =
                t.status === "PAID" ? "Đã thanh toán" : "Chờ xử lý";

              return `
                    <tr>
                        <td class="ps-4 fw-bold">#${t.id}</td>
                        <td>
                            <div class="fw-bold">${customerName}</div>
                            <small class="text-muted">${t.user ? t.user.email : t.customerPhone || ""}</small>
                        </td>
                        <td>
                            <div class="small fw-bold">${routeInfo}</div>
                            <small class="text-primary">${t.trip ? new Date(t.trip.departureTime).toLocaleString("vi-VN") : ""}</small>
                        </td>
                        <td><span class="badge bg-dark">${t.seatNumber || t.id}</span></td>
                        <td>${bookingDate}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteTicket(${t.id})">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                `;
            })
            .join("");

          document.getElementById("list-tickets").innerHTML =
            html ||
            '<tr><td colspan="7" class="text-center p-4">Chưa có vé nào được đặt</td></tr>';
        } catch (e) {
          console.error("Lỗi tải danh sách vé:", e);
          document.getElementById("list-tickets").innerHTML =
            '<tr><td colspan="7" class="text-center text-danger p-4">Không thể kết nối đến máy chủ API</td></tr>';
        }
      }

      async function deleteTicket(id) {
        if (confirm("Bạn có chắc chắn muốn hủy/xóa vé này?")) {
          const res = await fetch(`/api/tickets/${id}`, { method: "DELETE" });
          if (res.ok) {
            loadTickets();
          } else {
            alert("Không thể xóa vé này!");
          }
        }
      }

      document.addEventListener("DOMContentLoaded", loadTickets);
    </script>
  </body>
</html>
