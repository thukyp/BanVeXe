    <style>

      :root {

      #sidebar {
        width: var(--sidebar-w);

</head>
<body>

    <div id="sidebar">
        <div class="p-4 text-center">
            <h4 class="text-warning fw-bold mb-0">BANVEXE</h4>
            <small class="text-muted text-uppercase" style="font-size: 0.65rem;">Hệ thống quản trị</small>
        </div>
        <nav class="nav flex-column px-3 mt-3">
            <a class="nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i> Thống kê</a>
            <a class="nav-link" href="/admin/routes"><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a>
            <a class="nav-link" href="/admin/buses"><i class="bi bi-truck me-2"></i> Xe khách</a>
            <a class="nav-link" href="/admin/trips"><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a>
            <a class="nav-link active" href="/admin/tickets"><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a>

        </nav>

    <div id="main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">Danh sách Vé đã đặt</h3>
            <div class="text-muted small" id="current-time"></div>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4 py-3">Mã Vé</th>
                            <th>Khách hàng</th>
                            <th>Tuyến đường</th>
                            <th>Số Ghế</th>
                            <th>Ngày đặt</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="list-tickets">
                        </tbody>
                </table>
            </div>
            
            <div class="card-footer bg-white py-3 border-top-0">
                <nav>
                    <ul id="pagination" class="pagination pagination-sm justify-content-center mb-0">
                        </ul>
                </nav>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    /*<![CDATA[*/
        let currentPage = 0;
        const rowsPerPage = 10;

        // 1. Tải dữ liệu từ Server
        async function loadTickets(page = 0) {
            const listBody = document.getElementById("list-tickets");
            listBody.innerHTML = '<tr><td colspan="7" class="text-center p-4"><div class="spinner-border spinner-border-sm text-primary"></div> Đang tải...</td></tr>';
            
            try {
                currentPage = page;
                const res = await fetch('/api/tickets?page=' + page + '&size=' + rowsPerPage);
                if (!res.ok) throw new Error("Không thể lấy dữ liệu");
                
                const data = await res.json();
                
                // data.content là danh sách từ Page<Ticket> của Spring
                renderTicketTable(data.content || []);
                renderPagination(data.totalPages || 1, currentPage);
            } catch (e) {
                console.error("Lỗi:", e);
                listBody.innerHTML = '<tr><td colspan="7" class="text-center text-danger p-4">Lỗi kết nối máy chủ API</td></tr>';
            }
        }

        // 2. Hiển thị bảng dữ liệu
        function renderTicketTable(tickets) {
            const listBody = document.getElementById("list-tickets");
            if (!tickets || tickets.length === 0) {
                listBody.innerHTML = '<tr><td colspan="7" class="text-center p-5 text-muted">Chưa có dữ liệu vé nào được đặt</td></tr>';
                return;
            }

            let html = "";
            tickets.forEach(function(t) {
                // Xử lý thông tin khách hàng (User hoặc Vãng lai)
                const name = t.user ? (t.user.fullName || t.user.username) : (t.customerName || "Ẩn danh");
                const contact = t.user ? t.user.email : (t.customerPhone || "N/A");
                
                // Xử lý tuyến đường
                const route = (t.trip && t.trip.route) 
                    ? (t.trip.route.departureLocation + ' <i class="bi bi-arrow-right mx-1"></i> ' + t.trip.route.arrivalLocation) 
                    : '<span class="text-danger">N/A</span>';
                
                // Định dạng ngày đặt
                const bookingDate = t.bookingDate ? new Date(t.bookingDate).toLocaleDateString("vi-VN") : "N/A";
                
                // Trạng thái
                const isPaid = (t.status === "PAID" || t.status === "COMPLETED");
                const statusHtml = isPaid 
                    ? '<span class="status-paid"><i class="bi bi-check-circle-fill me-1"></i>Đã thanh toán</span>' 
                    : '<span class="status-pending"><i class="bi bi-clock-history me-1"></i>Chờ xử lý</span>';

                html += '<tr>' +
                    '<td class="ps-4 fw-bold text-muted">#' + t.id + '</td>' +
                    '<td><div class="fw-bold">' + name + '</div><small class="text-muted">' + contact + '</small></td>' +
                    '<td><div class="small">' + route + '</div></td>' +
                    '<td><span class="badge bg-dark">Ghế ' + (t.seatNumber || t.id) + '</span></td>' +
                    '<td>' + bookingDate + '</td>' +
                    '<td>' + statusHtml + '</td>' +
                    '<td class="text-center">' +
                        '<button class="btn-delete" onclick="deleteTicket(' + t.id + ')" title="Hủy vé">' +
                            '<i class="bi bi-trash3-fill"></i>' +
                        '</button>' +
                    '</td>' +
                '</tr>';
            });
            listBody.innerHTML = html;
        }

        // 3. Hiển thị phân trang
        function renderPagination(totalPages, current) {
            const pagination = document.getElementById("pagination");
            if (totalPages <= 1) {
                pagination.innerHTML = "";
                return;
            }

            let html = "";
            // Nút Trước
            html += '<li class="page-item ' + (current === 0 ? 'disabled' : '') + '">' +
                    '<a class="page-link" href="javascript:void(0)" onclick="loadTickets(' + (current - 1) + ')">Trước</a></li>';

            // Nút số trang
            for (let i = 0; i < totalPages; i++) {
                html += '<li class="page-item ' + (current === i ? 'active' : '') + '">' +
                        '<a class="page-link" href="javascript:void(0)" onclick="loadTickets(' + i + ')">' + (i + 1) + '</a></li>';
            }

            // Nút Sau
            html += '<li class="page-item ' + (current + 1 >= totalPages ? 'disabled' : '') + '">' +
                    '<a class="page-link" href="javascript:void(0)" onclick="loadTickets(' + (current + 1) + ')">Sau</a></li>';

            pagination.innerHTML = html;
      <div class="p-4 text-center">
        <h4 class="text-warning fw-bold">BANVEXE</h4>
        <small class="text-muted">Hệ thống Quản trị</small>
      </div>
      <nav class="nav flex-column px-3">
        <a class="nav-link" href="/admin/dashboard"
          ><i class="bi bi-speedometer2 me-2"></i> Thống kê</a
        >
        <a class="nav-link" href="/admin/routes"
          ><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a
        >
        <a class="nav-link" href="/admin/buses"
          ><i class="bi bi-truck me-2"></i> Xe khách</a
        >
        <a class="nav-link" href="/admin/trips"
          ><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a
        >
        <a class="nav-link active" href="/admin/tickets"
          ><i class="bi bi-ticket-perforated me-2"></i> Vé đã đặt</a
        >
        <a class="nav-link" href="/admin/users"
          ><i class="bi bi-people me-2"></i> Người dùng</a
        >
      </nav>
    </div>

    <div id="main">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Danh sách Vé đã đặt</h3>
        <button class="btn btn-primary shadow-sm" onclick="loadTickets()">
          <i class="bi bi-arrow-clockwise"></i> Làm mới dữ liệu
        </button>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th class="ps-4">Mã Vé</th>
                  <th>Khách hàng</th>
                  <th>Chuyến xe (Tuyến)</th>
                  <th>Số ghế</th>
                  <th>Thời gian đặt</th>
                  <th>Trạng thái</th>
                  <th class="text-center">Thao tác</th>
                </tr>
              </thead>
              <tbody id="list-tickets">
                <tr>
                  <td colspan="7" class="text-center p-5">
                    <div class="spinner-border text-primary"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      // Đã sửa: Bỏ chữ /admin ở giữa để khớp với @RequestMapping("/api/tickets") ở Backend
      const API_URL = "http://localhost:8080/api/tickets";

      async function loadTickets() {
        const tbody = document.getElementById("list-tickets");
        try {
          const res = await fetch(API_URL);
          if (!res.ok) throw new Error("Lỗi mạng hoặc API không tồn tại");

          const tickets = await res.json();

          if (!tickets || tickets.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="7" class="text-center p-4 text-muted">Chưa có dữ liệu vé nào.</td></tr>';
            return;
          }

          tbody.innerHTML = tickets
            .map((t) => {
              // 1. Khách hàng: lấy từ User Entity (fullName hoặc username)
              const name = t.user
                ? t.user.fullName || t.user.username
                : "Khách vãng lai";

              // 2. Chuyến xe: lấy từ Trip -> Route
              const route =
                t.trip && t.trip.route
                  ? `${t.trip.route.departureLocation} → ${t.trip.route.arrivalLocation}`
                  : "N/A";

              // 3. Xe: lấy từ Trip -> Bus
              const busInfo = t.trip?.bus?.busNumber
                ? `Xe: ${t.trip.bus.busNumber}`
                : "Xe: N/A";

              // 4. SỐ GHẾ
              const seat = t.seats ? t.seats.split(",").join(", ") : "N/A";

              const total = t.totalAmount
                ? t.totalAmount.toLocaleString("vi-VN") + "đ"
                : "N/A";

              // 5. THỜI GIAN: Khớp với biến 'private LocalDateTime bookingTime'
              const bookTime = t.bookingTime
                ? new Date(t.bookingTime).toLocaleString("vi-VN")
                : "N/A";

              // 6. Trạng thái: Dựa trên TicketStatus Enum
              let statusClass = "status-booked",
                statusText = "Chờ xử lý";
              if (t.status === "PAID") {
                statusClass = "status-paid";
                statusText = "Đã thanh toán";
              } else if (t.status === "CANCELLED") {
                statusClass = "status-cancelled";
                statusText = "Đã hủy";
              } else if (t.status === "BOOKED") {
                statusText = "Đã đặt chỗ";
              }

              return `
            <tr>
              <td class="ps-4 fw-bold">#${t.id}</td>
              <td><div>${name}</div></td>
              <td>
                <div class="small fw-bold text-primary">${route}</div>
                <div class="small text-muted">${busInfo}</div>
              </td>
              <td><span class="badge bg-dark">Ghế ${seat}</span></td>
              <td><small>${bookTime}</small></td>
              <td><span class="badge ${statusClass}">${statusText}</span></td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-danger" onclick="deleteTicket(${t.id})">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>`;
            })
            .join("");
        } catch (err) {
          console.error("Lỗi fetch:", err);
          tbody.innerHTML =
            '<tr><td colspan="7" class="text-center p-4 text-danger">Lỗi kết nối API. Hãy kiểm tra Backend.</td></tr>';
        }

        // 4. Hành động Xóa/Hủy vé
        async function deleteTicket(id) {
            if (confirm("Bạn có chắc chắn muốn xóa vé #" + id + "? Thao tác này không thể hoàn tác.")) {
                try {
                    const res = await fetch('/api/tickets/' + id, { method: 'DELETE' });
                    if (res.ok) {
                        loadTickets(currentPage); // Tải lại trang hiện tại
                    } else {
                        alert("Không thể xóa vé. Có lỗi xảy ra!");
                    }
                } catch (e) {
                    alert("Lỗi kết nối máy chủ!");
                }
            }
      // Hàm xóa vé
      async function deleteTicket(id) {
        const result = await Swal.fire({
          title: "Xác nhận xóa?",
          text: "Xóa vé #" + id + " sẽ không thể hoàn tác!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#d33",
          confirmButtonText: "Xóa",
          cancelButtonText: "Hủy",
        });

        if (result.isConfirmed) {
          try {
            const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            if (res.ok) {
              Swal.fire("Thành công", "Đã xóa vé!", "success");
              loadTickets();
            } else {
              Swal.fire("Lỗi", "Không thể xóa vé.", "error");
            }
          } catch (e) {
            Swal.fire("Lỗi", "Lỗi kết nối server.", "error");
          }
        }

        // Khởi tạo khi load trang
        document.addEventListener("DOMContentLoaded", function() {
            loadTickets(0);
        });
    /*]]>*/
    </script>
</body>
