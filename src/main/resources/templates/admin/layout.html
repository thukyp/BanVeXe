<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
    <style>
        :root { --sidebar-w: 240px; }
        body { background: #f8f9fa; }
        #sidebar { width: var(--sidebar-w); position: fixed; height: 100vh; background: #212529; color: white; }
        #main { margin-left: var(--sidebar-w); padding: 25px; }
        .nav-link { color: #adb5bd; padding: 12px 20px; }
        .nav-link:hover, .nav-link.active { color: white; background: #343a40; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="p-4 text-center"><h4 class="text-warning fw-bold">BANVEXE</h4></div>
        <nav class="nav flex-column">
            <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Thống kê</a>
            <a class="nav-link" th:href="@{/admin/routes}"><i class="bi bi-geo-alt me-2"></i> Tuyến xe</a>
            <a class="nav-link" th:href="@{/admin/buses}"><i class="bi bi-truck me-2"></i> Xe khách</a>
            <a class="nav-link" th:href="@{/admin/trips}"><i class="bi bi-calendar3 me-2"></i> Chuyến xe</a>
        </nav>
    </div>
    <div id="main">
        <div th:replace="${content}"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
