<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quên mật khẩu - BANVEXE</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet" />
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; min-height: 100vh; }
        .forgot-card { max-width: 400px; width: 100%; margin: auto; padding: 2rem; border-radius: 15px; background: white; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="forgot-card shadow-sm">
        <h3 class="fw-bold text-danger text-center mb-3">Quên mật khẩu?</h3>
        <p class="text-muted text-center small mb-4">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>
        
        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Email đăng ký</label>
                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Gửi yêu cầu</button>
        </form>
        
        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none small text-muted">Quay lại Đăng nhập</a>
        </div>
    </div>
</body>
</html>
