<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANVEXE - Hệ thống đặt vé xe trực tuyến</title>
    
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet" />
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css}" rel="stylesheet" />
    
    <style>
        :root { --futa-orange: #ef5222; }
        .navbar-brand { font-size: 1.5rem; }
        
        /* Hero Section Styling */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=2069&auto=format&fit=crop') no-repeat center center/cover;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Search Box Styling */
        .search-box {
            max-width: 900px;
            margin-top: -60px; /* Đẩy khung tìm kiếm lên trên banner */
            z-index: 10;
            position: relative;
        }
        
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .btn-warning { background-color: #ffc107; border: none; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold text-danger" th:href="@{/}">BANVEXE</a>
        
        <div class="ms-auto d-flex align-items-center" id="user-nav">
          
          <div th:if="${userName != null}" class="dropdown">
            <button class="btn btn-light dropdown-toggle fw-bold d-flex align-items-center" data-bs-toggle="dropdown" type="button">
              <img th:src="${userAvatar != null ? userAvatar : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="user-avatar me-2" />
              Chào, <span th:text="${userName}">Kỳ</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
              <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i>Thông tin cá nhân</a></li>
              <li><a class="dropdown-item" th:href="@{/history}"><i class="bi bi-ticket-perforated me-2"></i>Lịch sử đặt vé</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                  <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</button>
                </form>
              </li>
            </ul>
          </div>

          <div th:unless="${userName != null}">
            <a th:href="@{/login}" class="btn btn-outline-dark btn-sm px-4 me-2 border-0">Đăng nhập</a>
            <a th:href="@{/register}" class="btn btn-danger btn-sm px-4 rounded-pill">Đăng ký</a>
          </div>

        </div>
      </div>
    </nav>

    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-5 fw-bold text-white">Mua vé xe khách trực tuyến</h1>
        </div>
    </section>

    <div class="container">
        <div class="search-box bg-white p-4 rounded-4 shadow-lg mx-auto">
            <form th:action="@{/search}" method="GET" class="row g-3 align-items-end">
                <div class="col-md-4 text-start">
                    <label class="form-label fw-bold small text-muted">ĐIỂM ĐI</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" class="form-control border-0 bg-light" placeholder="Ví dụ: TP. Hồ Chí Minh" name="from">
                    </div>
                </div>
                <div class="col-md-4 text-start">
                    <label class="form-label fw-bold small text-muted">ĐIỂM ĐẾN</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-geo-fill"></i></span>
                        <input type="text" class="form-control border-0 bg-light" placeholder="Ví dụ: Đà Lạt" name="to">
                    </div>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 text-white">TÌM CHUYẾN XE</button>
                </div>
            </form>
        </div>
    </div>

    <div class="container my-5">
        <h3 class="text-success fw-bold mb-4">TUYẾN XE PHỔ BIẾN</h3>
        <div class="row g-4" id="popular-routes">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm rounded-3">
                    <img src="https://images.unsplash.com/photo-1513530534585-c7b1394c6d51?q=80&w=2071" class="card-img-top rounded-top-3" alt="Dalat">
                    <div class="card-body">
                        <h6 class="fw-bold">TP.HCM - Đà Lạt</h6>
                        <p class="text-danger fw-bold mb-0">300.000đ</p>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
