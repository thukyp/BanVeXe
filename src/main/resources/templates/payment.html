<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán - BanVeXe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --futa-orange: #ef5222; }
        body { background-color: #f4f7f6; }
        .payment-container { max-width: 900px; margin: 40px auto; }
        .card-custom { background: white; border-radius: 12px; padding: 25px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .method-item { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .method-item:hover { border-color: var(--futa-orange); background: #fff9f7; }
        .method-item input:checked + label { font-weight: bold; color: var(--futa-orange); }
        .price-total { font-size: 24px; color: var(--futa-orange); font-weight: bold; }
    </style>
</head>
<body>

<div class="container payment-container">
    <h4 class="fw-bold mb-4 text-center">THANH TOÁN</h4>
    
    <div class="row g-4">
        <div class="col-md-7">
            <div class="card-custom">
                <h6 class="fw-bold mb-3">Chọn phương thức thanh toán</h6>
                
                <div class="method-item">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payMethod" id="momo" checked>
                        <label class="form-check-label w-100" for="momo">
                            <img src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png" width="30" class="me-2"> Ví MoMo
                        </label>
                    </div>
                </div>

                <div class="method-item">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payMethod" id="vnpay">
                        <label class="form-check-label w-100" for="vnpay">
    <img src="https://vnpay.vn/wp-content/uploads/2020/07/Icon-VNPAY-QR.png" width="30" class="me-2"> VNPAY-QR
</label>
                </div>

                <div class="method-item">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payMethod" id="atm">
                        <label class="form-check-label w-100" for="atm">
                            <i class="bi bi-credit-card me-2"></i> Thẻ nội địa (ATM)
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card-custom shadow-sm border-top border-4 border-danger">
                <h6 class="fw-bold border-bottom pb-2 mb-3">Thông tin đơn hàng</h6>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Tuyến xe:</span>
                    <span id="route-info" class="fw-bold text-end">...</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Ghế đã chọn:</span>
                    <span id="seat-info" class="fw-bold text-primary">...</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Họ tên:</span>
                    <span id="name-info">...</span>
                </div>
                <hr>
                <div class="text-center">
                    <p class="mb-1 text-muted">Tổng cộng</p>
                    <p class="price-total" id="total-info">0đ</p>
                </div>
<button class="btn btn-danger w-100 fw-bold py-3 mt-3 rounded-pill" onclick="payWithPayOS()">THANH TOÁN PAYOS</button>            </div>
        </div>
    </div>
</div>

<script>
    // Lấy dữ liệu từ sessionStorage (Dữ liệu này được lưu từ trang booking)
    document.addEventListener("DOMContentLoaded", () => {
        const bookingData = JSON.parse(sessionStorage.getItem("pendingBooking"));
        
        if (bookingData) {
            document.getElementById('route-info').innerText = bookingData.routeName || "Chưa xác định";
            document.getElementById('seat-info').innerText = bookingData.seats || "Chưa chọn";
            document.getElementById('name-info').innerText = bookingData.customerName || "Khách vãng lai";
            document.getElementById('total-info').innerText = bookingData.totalAmount.toLocaleString() + "đ";
        } else {
            alert("Không tìm thấy thông tin đơn hàng!");
            window.location.href = "/";
        }
    });

    async function payWithPayOS() {
    const bookingData = JSON.parse(sessionStorage.getItem("pendingBooking"));

    const response = await fetch('/api/payment/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: bookingData.totalAmount })
    });

    const data = await response.json();

    window.location.href = data.checkoutUrl;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
