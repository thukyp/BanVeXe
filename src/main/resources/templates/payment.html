<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Thanh toán - BanVeXe</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --futa-orange: #ef5222;
        --futa-light: #fff9f7;
      }
      body {
        background-color: #f4f7f6;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .payment-container {
        max-width: 900px;
        margin: 40px auto;
      }
      .card-custom {
        background: white;
        border-radius: 12px;
        padding: 25px;
        border: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        height: 100%;
      }

      /* Style cho các item phương thức thanh toán */
      .method-item {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
      }
      .method-item:hover {
        border-color: var(--futa-orange);
        background: var(--futa-light);
      }
      .form-check-input:checked ~ .form-check-label {
        font-weight: bold;
        color: var(--futa-orange);
      }
      .method-item input:checked + label {
        color: var(--futa-orange);
      }

      .price-total {
        font-size: 26px;
        color: var(--futa-orange);
        font-weight: bold;
      }
      .btn-pay {
        background-color: var(--futa-orange);
        border: none;
        transition: 0.3s;
      }
      .btn-pay:hover {
        background-color: #d43f14;
        transform: translateY(-2px);
      }
      .btn-pay:disabled {
        background-color: #ccc;
      }
    </style>
  </head>
  <body>
    <div class="container payment-container">
      <h4 class="fw-bold mb-4 text-center text-uppercase">Thanh toán vé xe</h4>

      <div class="row g-4">
        <div class="col-md-7">
          <div class="card-custom">
            <h6 class="fw-bold mb-3">
              <i class="bi bi-wallet2 me-2"></i>Chọn phương thức thanh toán
            </h6>

            <div class="method-item">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="payMethod"
                  id="momo"
                  value="MOMO"
                  checked
                />
                <label class="form-check-label w-100" for="momo">
                  <img
                    src="https://upload.wikimedia.org/wikipedia/vi/f/fe/MoMo_Logo.png"
                    width="24"
                    class="me-2"
                  />
                  Ví MoMo
                </label>
              </div>
            </div>

            <div class="method-item">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="payMethod"
                  id="payos"
                  value="PAYOS"
                />
                <label class="form-check-label w-100" for="payos">
                  <img
                    src="https://vnpay.vn/wp-content/uploads/2020/07/Icon-VNPAY-QR.png"
                    width="24"
                    class="me-2"
                  />
                  Cổng PayOS (QR Ngân hàng)
                </label>
              </div>
            </div>

            <div class="method-item">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="payMethod"
                  id="payLater"
                  value="LATER"
                />
                <label class="form-check-label w-100" for="payLater">
                  <i class="bi bi-cash-stack me-2 fs-5 text-success"></i> Thanh
                  toán tại quầy (Thanh toán sau)
                </label>
              </div>
            </div>

            <p class="text-muted small mt-3 italic">
              * Lưu ý: Đối với thanh toán tại quầy, quý khách vui lòng có mặt
              trước 30 phút để nhận vé.
            </p>
          </div>
        </div>

        <div class="col-md-5">
          <div class="card-custom border-top border-4 border-danger">
            <h6 class="fw-bold border-bottom pb-2 mb-3">Chi tiết chuyến đi</h6>
            <div class="mb-3">
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Tuyến xe:</span>
                <span id="route-info" class="fw-bold text-end">...</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Số ghế:</span>
                <span id="seat-info" class="fw-bold text-primary">...</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Hành khách:</span>
                <span id="name-info" class="fw-bold">...</span>
              </div>
            </div>

            <div class="bg-light p-3 rounded text-center">
              <p class="mb-1 text-muted small uppercase fw-bold">
                Tổng tiền thanh toán
              </p>
              <p class="price-total mb-0" id="total-info">0đ</p>
            </div>

            <button
              id="btnSubmit"
              class="btn btn-danger btn-pay w-100 fw-bold py-3 mt-4 rounded-pill shadow-sm"
              onclick="handleProcess()"
            >
              XÁC NHẬN ĐẶT VÉ
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 1. Tự động load dữ liệu từ Booking
      document.addEventListener("DOMContentLoaded", () => {
        const bookingData = JSON.parse(
          sessionStorage.getItem("pendingBooking"),
        );

        if (bookingData) {
          document.getElementById("route-info").innerText =
            bookingData.routeName || "N/A";
          document.getElementById("seat-info").innerText =
            bookingData.seats || "N/A";
          document.getElementById("name-info").innerText =
            bookingData.customerName || "Khách hàng";
          document.getElementById("total-info").innerText =
            (bookingData.totalAmount || 0).toLocaleString() + "đ";
        } else {
          alert("Phiên làm việc hết hạn!");
          window.location.href = "/";
        }
      });

      // 2. Hàm xử lý chính khi nhấn nút
      async function handleProcess() {
        const payMethod = document.querySelector(
          'input[name="payMethod"]:checked',
        ).value;
        const btn = document.getElementById("btnSubmit");
        const bookingData = JSON.parse(
          sessionStorage.getItem("pendingBooking"),
        );

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> ĐANG XỬ LÝ...`;

        try {
          if (payMethod === "LATER") {
            // GỌI API THANH TOÁN SAU
            await processPayLater(bookingData);
          } else {
            // GỌI API THANH TOÁN ONLINE (PAYOS)
            await processPayOnline(bookingData);
          }
        } catch (error) {
          alert("Lỗi: " + error.message);
          btn.disabled = false;
          btn.innerText = "XÁC NHẬN ĐẶT VÉ";
        }
      }

      // 3. Xử lý Thanh toán sau
      async function processPayLater(data) {
        // 1. Chuẩn bị lại object để khớp với Entity/DTO trong Java
        const payload = {
          tripId: data.tripId,
          customerName: data.customerName,
          customerPhone: data.customerPhone,
          customerEmail: data.customerEmail,
          // Đảm bảo seats là mảng hoặc chuỗi tùy theo Backend của bạn
          // Nếu Backend cần chuỗi "B04,B13" thì dùng data.seats.join(",")
          seatNumbers: Array.isArray(data.seats) ? data.seats : [data.seats],
          totalAmount: data.totalAmount,
          paymentStatus: "PENDING",
          paymentMethod: "CASH",
        };

        console.log("Dữ liệu gửi lên Backend:", payload);

        const response = await fetch("/api/payment/pay-later", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (response.ok) {
          // Xóa session sau khi đặt thành công
          sessionStorage.removeItem("pendingBooking");
          alert("Đặt chỗ thành công! Mã vé đã được lưu.");
          window.location.href = "/payment/success";
        } else {
          // Đọc chi tiết lỗi từ server để debug
          const errorDetail = await response.text();
          console.error("Server Error:", errorDetail);
          throw new Error("Server báo lỗi: " + errorDetail);
        }
      }

      // 4. Xử lý Thanh toán Online (PayOS)
      async function processPayOnline(data) {
        const response = await fetch("/api/payment/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: data.totalAmount,
            seats: data.seats,
            customerName: data.customerName,
          }),
        });

        const result = await response.json();
        if (result.checkoutUrl) {
          window.location.href = result.checkoutUrl;
        } else {
          throw new Error("Lỗi tạo link thanh toán.");
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
