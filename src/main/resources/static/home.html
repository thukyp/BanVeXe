<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>BusTicket</title>
    <link rel="stylesheet" href="css/home.css" />
    <script src="js/auth.js"></script>
  </head>

  <body>
    <header>
      <div><b>BusTicket</b></div>

      <div class="menu">
        <a href="login.html">Đăng nhập</a>
        <a href="register.html">Đăng ký</a>
        <a href="myticket.html">Vé của tôi</a>
      </div>
    </header>

    <!-- BANNER -->

    <div class="banner">
      <div class="search-box">
        <div class="vehicle-type">
          <label>
            <input type="radio" name="vehicle" onclick="showBus()" /> Xe thường
          </label>

          <label> <input type="radio" name="vehicle" /> Xe giường nằm </label>

          <label> <input type="radio" name="vehicle" /> Xe limousine </label>
        </div>

        <div class="form-row">
          <input type="text" placeholder="Nơi đi" />

          <input type="text" placeholder="Nơi đến" />

          <input type="date" />

          <button>Tìm</button>
        </div>

        <div id="busType" style="margin-top: 10px; display: none">
          <select
            style="padding: 10px; border-radius: 6px; border: 1px solid #ccc"
          >
            <option>Xe 16 chỗ</option>
            <option>Xe 29 chỗ</option>
            <option>Xe 45 chỗ</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ROUTES -->

    <section class="routes">
      <h2>Tuyến phổ biến</h2>

      <div class="cards">
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957"
          />

          <p>Sài Gòn - Nha Trang</p>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1503376780353-7e6692767b70"
          />

          <p>Hà Nội - Hải Phòng</p>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1519583272095-6433daf26b6e"
          />

          <p>Sài Gòn - Phan Thiết</p>
        </div>
      </div>
    </section>

    <script>
      function showBus() {
        document.getElementById("busType").style.display = "block";
      }
    </script>
  </body>
</html>
