<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký</title>

    <script src="js/auth.js"></script>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family:
          Segoe UI,
          sans-serif;
        background: linear-gradient(135deg, #43e97b, #38f9d7);
      }

      .card {
        width: 360px;
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 25px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      button {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 6px;
        background: #43e97b;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background: #32d86a;
      }

      .link {
        text-align: center;
        margin-top: 15px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Đăng ký</h2>

      <input id="reg-username" placeholder="Username" />

      <input id="reg-password" type="password" placeholder="Password" />

      <input id="reg-fullname" placeholder="Họ tên" />

      <input id="reg-email" placeholder="Email" />

      <input id="reg-phone" placeholder="Số điện thoại" />

      <button onclick="handleRegister()">Đăng ký</button>

      <div class="link">
        Đã có tài khoản?
        <a href="login.html">Đăng nhập</a>
      </div>
    </div>
  </body>
</html>
