# =========================================================
# 1. Cấu hình Ứng dụng & Database
# =========================================================
spring.application.name=banvexe_db

# Đảm bảo cổng là 3307 vì phpMyAdmin/MySQL của bạn đang chạy ở đây
# Dòng 1: URL phải kết thúc bằng allowPublicKeyRetrieval=true và PHẢI xuống dòng
spring.datasource.url=jdbc:mysql://localhost:3306/banvexe?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Dòng 2: Username phải ở dòng mới hoàn toàn
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dòng 3: Password
spring.datasource.password=123456

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# 2. Cấu hình Giao diện (Thymeleaf)
# =========================================================
# Tắt cache để thay đổi giao diện/CSS có hiệu lực ngay lập tức mà không cần khởi động lại máy
spring.thymeleaf.cache=false
spring.web.resources.chain.cache=false
spring.mvc.static-path-pattern=/static/**

# =========================================================
# 3. Cấu hình Bảo mật OAuth2 (Google)
# =========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# =========================================================
# 4. CẤU HÌNH GỬI EMAIL (Cho tính năng Quên mật khẩu)
# =========================================================
# Sử dụng SMTP của Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
# LƯU Ý: Đây là "Mật khẩu ứng dụng" (App Password), không phải mật khẩu Gmail chính
spring.mail.password=your-app-password-here 

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000

# =========================================================
# 5. Cấu hình Logging (Gỡ lỗi)
# =========================================================
logging.level.org.springframework.security=DEBUG
# Log lỗi gửi mail nếu có
logging.level.org.springframework.mail=DEBUG